name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (backend + tests)
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy statsmodels scikit-learn pytest ruff

      - name: Lint (errores críticos)
        run: ruff check . --select E9,F63,F7,F82

      - name: Run tests
        run: pytest tests/ -q
